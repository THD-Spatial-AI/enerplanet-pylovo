# HAProxy configuration for PyLovo API
# Europe-scale deployment with advanced load balancing

global
    maxconn 50000
    log stdout format raw local0 info
    # Performance tuning
    tune.ssl.default-dh-param 2048

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    
    # Timeouts — large grid operations (750+ buildings) can take hours
    timeout connect 10s
    timeout client 86400s
    timeout server 86400s
    timeout queue 300s
    timeout http-request 86400s
    timeout http-keep-alive 30s

# Stats dashboard - accessible at :8404/stats
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
    stats show-legends

# Main frontend for API traffic
frontend pylovo_frontend
    bind *:80
    
    # Rate limiting - 100 requests per second per IP
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }
    
    # Health check bypass (no rate limit)
    acl is_health path /health
    
    # Route all traffic to backend
    default_backend pylovo_backend

# Backend pool of PyLovo API instances
backend pylovo_backend
    balance leastconn
    option httpchk GET /health
    http-check expect status 200
    
    # Queue settings for handling bursts
    timeout queue 120s
    
    # Slow start - gradually increase traffic to new/recovered servers
    default-server inter 5s fall 3 rise 2 slowstart 60s
    
    # Backend servers with health checks
    server pylovo-api-1 pylovo-api-1:8086 check weight 100 maxconn 100
    server pylovo-api-2 pylovo-api-2:8086 check weight 100 maxconn 100
    server pylovo-api-3 pylovo-api-3:8086 check weight 100 maxconn 100
    
    # Connection reuse
    http-reuse safe
