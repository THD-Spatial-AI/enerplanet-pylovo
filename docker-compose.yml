services:
  # HAProxy Load Balancer (replaces nginx)
  haproxy:
    image: haproxy:2.9-alpine
    container_name: pylovo-haproxy
    ports:
      - "8086:80"
      - "8404:8404"  # Stats dashboard
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - pylovo-api-1
      - pylovo-api-2
      - pylovo-api-3
    restart: unless-stopped
    networks:
      - default
      - spatialhub-net

  # Redis Cache (shared across all workers)
  redis:
    image: redis:7-alpine
    container_name: pylovo-redis
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # PostgreSQL with PostGIS + pgRouting
  postgres:
    image: pgrouting/pgrouting:17-3.5-3.7.3
    container_name: pylovo-postgres
    shm_size: 8g
    ports:
      - "${PYLOVO_POSTGRES_PORT:-5434}:5432"
    environment:
      - POSTGRES_DB=pylovo_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pylovo-pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "12"
          memory: 56G
        reservations:
          memory: 16G
    command:
      - "postgres"
      # Memory — 64 GB budget (shared server with PyPSA/Calliope)
      - "-c"
      - "shared_buffers=14GB"
      - "-c"
      - "effective_cache_size=42GB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "maintenance_work_mem=2GB"
      - "-c"
      - "huge_pages=try"
      # Parallelism — 12 cores budget
      - "-c"
      - "max_worker_processes=12"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      # Connections
      - "-c"
      - "max_connections=200"
      # WAL & Checkpoints
      - "-c"
      - "wal_buffers=256MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=8GB"
      # Planner
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "default_statistics_target=500"
      - "-c"
      - "jit=on"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pylovo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PyLovo API Instance 1
  pylovo-api-1:
    build: .
    container_name: pylovo-api-1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker
    volumes:
      - ./raw_data:/app/raw_data
      - ./api:/app/api:ro
      - ./src:/app/src:ro
      - ./runme:/app/runme:ro
      - ./datapipeline:/app/datapipeline:ro
      - ./datapipeline/cache:/app/datapipeline/cache
      - ./config:/app/config:ro
    environment:
      - HOST=postgres
      - PORT=5432
      - DBNAME=pylovo_db
      - DBUSER=postgres
      - PASSWORD=postgres
      - TARGET_SCHEMA=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_ID=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8086", "--workers", "4"]

  # PyLovo API Instance 2
  pylovo-api-2:
    build: .
    container_name: pylovo-api-2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker
    volumes:
      - ./api:/app/api:ro
      - ./src:/app/src:ro
      - ./runme:/app/runme:ro
      - ./datapipeline:/app/datapipeline:ro
      - ./datapipeline/cache:/app/datapipeline/cache
      - ./config:/app/config:ro
    environment:
      - HOST=postgres
      - PORT=5432
      - DBNAME=pylovo_db
      - DBUSER=postgres
      - PASSWORD=postgres
      - TARGET_SCHEMA=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_ID=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8086", "--workers", "4"]

  # PyLovo API Instance 3
  pylovo-api-3:
    build: .
    container_name: pylovo-api-3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker
    volumes:
      - ./api:/app/api:ro
      - ./src:/app/src:ro
      - ./runme:/app/runme:ro
      - ./datapipeline:/app/datapipeline:ro
      - ./datapipeline/cache:/app/datapipeline/cache
      - ./config:/app/config:ro
    environment:
      - HOST=postgres
      - PORT=5432
      - DBNAME=pylovo_db
      - DBUSER=postgres
      - PASSWORD=postgres
      - TARGET_SCHEMA=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_ID=3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8086", "--workers", "4"]

networks:
  spatialhub-net:
    external: true

volumes:
  pylovo-pgdata:
