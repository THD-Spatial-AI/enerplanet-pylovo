events {
    worker_connections 1024;
}

http {
    # Upstream pool of PyLovo API instances
    upstream pylovo_backend {
        least_conn;  # Route to least busy server
        
        server pylovo-api-1:8086 weight=1 max_fails=3 fail_timeout=30s;
        server pylovo-api-2:8086 weight=1 max_fails=3 fail_timeout=30s;
        server pylovo-api-3:8086 weight=1 max_fails=3 fail_timeout=30s;
        
        keepalive 32;  # Keep connections alive for reuse
    }

    server {
        listen 80;
        server_name _;

        # Increase timeouts for long-running queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;

        # Buffer settings for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Health check endpoint
        location /health {
            proxy_pass http://pylovo_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Main API
        location / {
            proxy_pass http://pylovo_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Disable buffering for streaming responses
            proxy_buffering off;
        }

        # Nginx status (optional, for monitoring)
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}
