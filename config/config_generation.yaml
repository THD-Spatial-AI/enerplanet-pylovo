# Cables available for consumer connections (house connections from feeder to buildings) - must be a subset of the equipment data cables
CONSUMER_CONNECTION_AVAILABLE_CABLES:
  - NAYY_4_120  # NAYY_4_120
  - NAYY_4_50   # NAYY_4_50
  - NYY_4_35    # NYY_4_35
  - NYY_4_16    # NYY_4_16
# Thresholds to derive settlement_types
RURAL_MAX_HOUSEHOLDS: 1.25 # Maximum average number of households per building for rural settlements
URBAN_MIN_HOUSEHOLDS: 5 # Minimum average number of households per building for urban settlements
RURAL_MIN_BUILDING_DISTANCE: 50 # Minimum average distance between buildings for rural settlements
URBAN_MAX_BUILDING_DISTANCE: 25 # Maximum average distance between buildings for urban settlements
SETTLEMENT_TYPE_SCORE_DEADBAND: 0.05 # Prefer settlement type 2 when the weighted score is close to a threshold

# Transformer mapping: Settlement Type -> Allowed Transformer Capacities (s_max_kva)
TRANSFORMER_MAPPING:
  1: [100, 160, 250] # 1=Rural
  2: [160, 250, 400, 630] # 2=Semi-urban
  3: [400, 630] # 3=Urban

# Transformer placement parameters
MAX_BROWNFIELD_TRAFO_DISTANCE: 800 # Maximum connection distance from brownfield transformer
# Extend postcode boundary when selecting candidate roads to reduce artificial edge fragmentation.
WAYS_BOUNDARY_BUFFER_M: 50.0
# Larger components are divided by k-means clustering in roughly LARGE_COMPONENT_DIVIDER sizes
LARGE_COMPONENT_LOWER_BOUND: 500 # Threshold for number of buildings in a component to apply k-means clustering
LARGE_COMPONENT_DIVIDER: 1000 # Divider to derive the target number of clusters for k-means clustering
# Seed for the initialization of the k-means clustering for transformer placement - keeping the same ensures deterministic behavior
K_MEANS_SEED: 3329829316 # Has to be an integer between 0 and 4294967295
# Optional post-processing to reduce artificial singleton kcids from fragmented roads.
# Only tiny components are merged, and only when a short synthetic bridge edge can connect them.
SMALL_COMPONENT_MERGE_ENABLED: true
SMALL_COMPONENT_MERGE_MAX_BUILDINGS: 1
SMALL_COMPONENT_MERGE_MAX_DISTANCE_M: 120.0
SMALL_COMPONENT_MERGE_BRIDGE_CLAZZ: -99
# Post-clustering QA gates (warning by default; can be set to hard-fail in strict runs).
KCID_QA_GATES_ENABLED: true
KCID_QA_MAX_SINGLETON_RATIO: 0.75
KCID_QA_MAX_UNASSIGNED_CONSUMERS: 0
KCID_QA_RAISE_ON_FAILURE: false

# =============================================================================
# CABLE DIMENSIONING PARAMETERS
# =============================================================================
VN: 400  # Nominal voltage in the low voltage grid
V_BAND_LOW: 0.95  # Relevant for worst case condition
V_BAND_HIGH: 1.05 # Only for pandapower - not for dimensioning
### Load thresholds for different voltage drop limits
SMALL_LOAD_THRESHOLD_KW: 100  # Threshold below which stricter voltage drop limits apply
# Voltage drop limits for consumer connections (as percentage of nominal voltage per km)
VOLTAGE_DROP_SMALL_LOAD_PERCENT_PER_KM: 0.05  # 0.05% per km: Maximum voltage drop for loads ≤ 100kW (0.002V per km)
VOLTAGE_DROP_LARGE_LOAD_PERCENT_PER_KM: 0.1   # 0.1% per km: Maximum voltage drop for loads > 100kW (0.004V per km)
# Voltage drop limit for feeder cables (total voltage drop as percentage of nominal voltage)
VOLTAGE_DROP_DISTRIBUTION_PERCENT: 4.5  # 4.5% of 400V = 18V total voltage drop for distribution
TRANSFORMER_LOADING_MARGIN: 1.10  # Additional sizing margin on top of apparent-power conversion
