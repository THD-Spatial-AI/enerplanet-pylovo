# Equipment data for transformers and cables
# These are IEC-compliant cable types used across Europe for LV distribution grids:
# - NYY: PVC-insulated copper cables (German standard, IEC 60502 compliant)
# - NAYY: PVC-insulated aluminum cables (German standard, IEC 60502 compliant)
# Equivalent cables in other countries:
# - Netherlands: GPLK, XLPE (similar specs) - NYY/NAYY are compatible
# - Austria/Switzerland: Uses same German standards (NYY/NAYY)
# - France: U-1000 R2V (similar to NYY) - can use NYY as proxy
# For country-specific equipment, add EQUIPMENT_DATA_<COUNTRY_CODE> section below
# Cost semantics:
# - cost_eur: legacy/effective fallback used by older code paths
# - equipment_only_cost_eur: bare equipment cost (transformer €/unit, cable €/m)
# - installed_cost_eur: installed CAPEX when available (transformer €/unit, cable €/m)
EQUIPMENT_DATA:
  - {name: Tr_100, s_max_kva: 100, cost_eur: 2000, typ: Transformer}
  - {name: Tr_160, s_max_kva: 160, cost_eur: 3000, typ: Transformer}
