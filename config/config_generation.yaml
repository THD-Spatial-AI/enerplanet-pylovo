# =============================================================================
# REGIONAL CONFIGURATION
# =============================================================================
PLZ: 86150
# AGS: 9474126
# PLZ: [86150, 86152] # Augsburg: [86150, 86152, 86153, 86154, 86156, 86157, 86159, 86161, 86163, 86165, 86167, 86169, 86179, 86199]
# AGS: [9162000, 9163000, 9164000]
TESTING: False # If True, only a small subset of data is used for faster testing

# =============================================================================
# EXECUTION CONFIGURATION
# =============================================================================
PARALLEL: False # Toggles whether the grid generation uses multiple workers in parallel
N_JOBS_PERCENT: 60  # Percentage of CPU cores to use for parallel grid generation
ANALYZE_GRIDS: True # Toggles analysis after grid generation (basic parameters, trafo analysis, cable counting)
SAVE_GRID_FOLDER: False # Toggles whether the grid json files will be saved in a folder or just in the db
LOG_LEVEL: INFO #DEBUG, INFO, ERROR - Logging configurations
RESULT_DIR: results # Directory for storing analysis results and outputs

# Electrical backend configuration
# Options: 'pandapower', 'opendss'
ELECTRICAL_BACKEND: pandapower

# =============================================================================
# GRID GENERATION CONFIGURATION
# =============================================================================
VERSION_ID: "1" # Change version if you changed any grid parameters or queries (e.g. transformer query)
VERSION_COMMENT: base version # State here which parameters, queries are used to compute the grids with current VERSION_ID
PEAK_LOAD_HOUSEHOLD: 14.50 # default: 14.5kW, 30 kW if electric hot water supply is included
SIM_FACTOR: {residential: 0.07, public: 0.60, commercial: 0.50, industrial: 0.60, agricultural: 0.60, infrastructure: 0.60} # Simultaneous load factor per parent_category
DEFAULT_POWER_FACTOR: 0.95  # cos(phi) for residential loads
AUTO_REGISTER_MISSING_F_CLASSES: True  # Auto-create consumer_categories rows for unseen f_class values
F_CLASS_AUDIT_WARN_THRESHOLD: 0.001  # Warn if uncovered building share exceeds 0.1%
F_CLASS_AUDIT_FAIL_THRESHOLD: 0.01  # Fail if uncovered building share exceeds 1%
F_CLASS_AUDIT_TOP_N: 25  # Print top-N uncovered f_class values in audit logs

# Consumer categories for load calculation — one entry per OSM f_class
# load_method: "household" = peak_load × households_per_building, "area" = peak_load_per_m2 × area / 1000
# parent_category: groups f_classes for simultaneity calculation (residential/commercial/public/industrial/agricultural/infrastructure)
# Peak load values from VDI 3807, DIN 18599, EnEV, and German grid planning standards
